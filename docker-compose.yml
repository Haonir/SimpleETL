services:
  simpleetl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simpleetl
    restart: unless-stopped
    ports:
      - "${APP_SERVER_PORT:-8000}:8000"
    volumes:
      # Data directory (uploads, output, jobs)
      - ./data:/data
      # SQLite database
      - ./backend/simpleetl.db:/app/simpleetl.db
      # Frontend config (editable without rebuild)
      - .config.json:/app/static/config.json
    env_file:
      - backend/.env
    environment:
      - APP_DATA_DIR=/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  simpleetl-db:
    driver: local
