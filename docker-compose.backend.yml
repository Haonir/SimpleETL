# Backend-only deployment (machine 2)

services:
  simpleetl:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: simpleetl-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - simpleetl-data:/app/data
    env_file:
      - backend/.env
    environment:
      - APP_DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  simpleetl-data:
    driver: local
